<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Bill Splitter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">

    <!-- SIDEBAR INPUT -->
    <aside class="sidebar">

      <h2>Control Panel</h2>

      <div class="card">
        <h3>Add User</h3>
        <input id="name" placeholder="Name">
        <input id="roomSize" type="number" placeholder="Room Size">
        <input id="days" type="number" placeholder="Days Present">
        <button onclick="addUser()">Add User</button>
      </div>

      <div class="card">
        <h3>Add Bill</h3>
        <input id="billType" placeholder="Type">
        <input id="amount" type="number" placeholder="Amount">

        <select id="splitType">
          <option value="equal">Equal</option>
          <option value="presence">Presence</option>
          <option value="room_size">Room Size</option>
        </select>

        <button onclick="addBill()">Add Bill</button>
      </div>

      <button class="primary" onclick="calculate()">Calculate</button>

    </aside>

    <!-- MAIN DASHBOARD -->
    <main class="dashboard">

      <h1>Smart Bill Dashboard</h1>

      <div class="grid">

        <section class="panel">
          <h3>Users</h3>
          <div id="usersBox"></div>
        </section>

        <section class="panel">
          <h3>Bills</h3>
          <div id="billsBox"></div>
        </section>

        <section class="panel full">
          <h3>Results</h3>
          <pre id="output"></pre>
        </section>

      </div>

    </main>

  </div>

  <script src="app.js"></script>
</body>
</html>
